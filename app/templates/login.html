{% extends "base.html" %}
{% block title %}登录 - 合同管理系统{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-card">
        <h1>📋 合同管理系统</h1>
        <p class="subtitle">请使用您的账号登录</p>

        <div id="login-error" class="flash-message flash-error" style="display:{% if error %}block{% else %}none{% endif %}; margin-bottom:16px;">
            {{ error or '' }}
        </div>

        <form onsubmit="return submitLoginForm(this)">
            <div class="form-group">
                <label class="form-label" for="username">用户名</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="请输入用户名" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">密码</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:10px; font-size:15px;">
                登 录
            </button>
        </form>

        <p style="text-align:center; margin-top: 20px; font-size: 12px; color: var(--gray-500);">
            演示账号：admin / admin123 或 user / user123
        </p>
    </div>
</div>
{% endblock %}
