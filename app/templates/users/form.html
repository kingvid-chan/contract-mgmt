{% extends "base.html" %}
{% block title %}{{ '编辑用户' if user else '创建用户' }} - 合同管理系统{% endblock %}

{% block content %}
<div class="card" style="max-width: 560px; margin: 0 auto;">
    <div class="card-header">
        <h2 class="card-title">{{ '编辑用户' if user else '创建用户' }}</h2>
        <a href="/projects/contract-mgmt/users" class="btn btn-sm btn-secondary">← 返回列表</a>
    </div>

    <form onsubmit="return submitUserForm(this, '{{ "/projects/contract-mgmt/api/users/" + (user.id|string) if user else "/projects/contract-mgmt/api/users/" }}', '{{ "PUT" if user else "POST" }}', {{ "false" if user else "true" }})">
        <div class="form-group">
            <label class="form-label" for="username">用户名</label>
            {% if user %}
            <input type="text" id="username" class="form-input" value="{{ user.username }}" readonly disabled style="background:var(--gray-100);">
            {% else %}
            <input type="text" id="username" name="username" class="form-input" placeholder="3-50个字符" required minlength="3" maxlength="50">
            {% endif %}
        </div>

        {% if not user %}
        <div class="form-group">
            <label class="form-label" for="password">密码</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="至少6个字符" required minlength="6">
        </div>
        {% endif %}

        <div class="form-group">
            <label class="form-label" for="display_name">显示名</label>
            <input type="text" id="display_name" name="display_name" class="form-input" placeholder="用户显示名称" value="{{ user.display_name if user else '' }}" required>
        </div>

        <div class="form-group">
            <label class="form-label" for="role">角色</label>
            <select id="role" name="role" class="form-select">
                <option value="user" {% if user and user.role == 'user' %}selected{% endif %}>普通用户 (user)</option>
                <option value="admin" {% if user and user.role == 'admin' %}selected{% endif %}>管理员 (admin)</option>
            </select>
        </div>

        <div style="display: flex; gap: 8px; margin-top: 24px;">
            <button type="submit" class="btn btn-primary">{{ '保存修改' if user else '创建用户' }}</button>
            <a href="/projects/contract-mgmt/users" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
